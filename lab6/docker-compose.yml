version: '3.8'

services:
  categories-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: categories_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432" # Dostęp z zewnątrz 
    networks:
      - app-network

  elements-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: elements_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432" 
    networks:
      - app-network

  
  category-service:
    build: ./category-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://categories-db:5432/categories_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
    depends_on:
      - categories-db
    networks:
      - app-network


  element-service:
    build: ./element-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://elements-db:5432/elements_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
    depends_on:
      - elements-db
    networks:
      - app-network

  # GATEWAY
  gateway-service:
    build: ./gateway-service
    ports:
      - "8080:8080" 
    environment:
      SERVER_PORT: 8080
    depends_on:
      - category-service
      - element-service
    networks:
      - app-network


  frontend:
    build: ./frontend
    ports:
      - "4200:80" 
    depends_on:
      - gateway-service
    networks:
      - app-network

networks:
  app-network:
    driver: bridge