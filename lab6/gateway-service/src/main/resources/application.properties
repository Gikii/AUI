server.port=8080
spring.application.name=gateway-service
spring.cloud.compatibility-verifier.enabled=false


spring.cloud.gateway.routes[0].id=category-service
spring.cloud.gateway.routes[0].uri=http://category-service:8080
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/brands/**

spring.cloud.gateway.routes[1].id=element-service
spring.cloud.gateway.routes[1].uri=http://element-service:8080
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/models/**